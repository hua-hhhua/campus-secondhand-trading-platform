<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评价管理 - 校园交易平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin: 0;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .home-link:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            min-width: 150px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background-color: #409EFF;
            color: white;
        }

        .btn-primary:hover {
            background-color: #66b1ff;
        }

        .btn-danger {
            background-color: #f56c6c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #f78989;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background-color: #f5f7fa;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ebeef5;
        }

        th {
            font-weight: 600;
            color: #606266;
            white-space: nowrap;
        }

        tr:hover {
            background-color: #f5f7fa;
        }

        .rating-stars {
            color: #faad14;
            font-size: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-reply, .btn-delete {
            padding: 5px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }

        .btn-reply {
            background-color: #409EFF;
            color: white;
        }

        .btn-delete {
            background-color: #f56c6c;
            color: white;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pagination a, .pagination span {
            padding: 8px 15px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            text-decoration: none;
            color: #606266;
            transition: all 0.3s;
        }

        .pagination a:hover {
            color: #409EFF;
            border-color: #c6e2ff;
            background-color: #ecf5ff;
        }

        .pagination .active {
            background-color: #409EFF;
            color: white;
            border-color: #409EFF;
        }

        .content-text {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            width: 600px;
            border-radius: 8px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .modal-body textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            resize: vertical;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⭐ 评价管理</h1>
        <a href="/" class="home-link">🏠 返回首页</a>
    </div>

    <div class="filter-bar">
        <label style="font-weight: 500; color: #555;">评分筛选：</label>
        <select id="ratingFilter" onchange="filterByRating()">
            <option value="">全部评分</option>
            <option value="5" th:selected="${ratingFilter == 5}">5星 ⭐⭐⭐⭐⭐</option>
            <option value="4" th:selected="${ratingFilter == 4}">4星 ⭐⭐⭐⭐</option>
            <option value="3" th:selected="${ratingFilter == 3}">3星 ⭐⭐⭐</option>
            <option value="2" th:selected="${ratingFilter == 2}">2星 ⭐⭐</option>
            <option value="1" th:selected="${ratingFilter == 1}">1星 ⭐</option>
        </select>
    </div>

    <div class="total-info" style="margin-bottom: 15px; color: #666;">
        共找到 <strong th:text="${reviewPage.total}">0</strong> 条评价，当前第 <strong th:text="${reviewPage.current}">1</strong> 页
    </div>

    <div class="table-container">
        <table th:if="${reviewPage} and ${reviewPage.records.size() > 0}">
            <thead>
            <tr>
                <th>ID</th>
                <th>订单号</th>
                <th>商品名称</th>
                <th>评价人</th>
                <th>被评人</th>
                <th>评分</th>
                <th>评价内容</th>
                <th>商家回复</th>
                <th>评价时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="review : ${reviewPage.records}">
                <td th:text="${review.id}">?</td>
                <td th:text="${review.orderId}">?</td>
                <td th:text="${review.articleTitle != null ? review.articleTitle : '-'}">?</td>
                <td th:text="${review.buyerName != null ? review.buyerName : '-'}">?</td>
                <td th:text="${review.sellerName != null ? review.sellerName : '-'}">?</td>
                <td>
                    <div class="rating-stars">
                        <span th:text="${#strings.repeat('⭐', review.rating)}">⭐⭐⭐⭐⭐</span>
                    </div>
                </td>
                <td>
                    <div class="content-text" th:text="${review.content}" th:title="${review.content}">?</div>
                </td>
                <td>
                    <div class="content-text" th:text="${review.reply != null ? review.reply : '未回复'}"
                         th:title="${review.reply != null ? review.reply : '未回复'}">?</div>
                </td>
                <td th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm:ss')}">?</td>
                <td class="action-buttons">
                    <button class="btn-reply"
                            th:attr="onclick='showReplyModal(' + ${review.id} + ', \'' + (${review.reply != null ? review.reply : ''}) + '\')'">回复</button>
                    <button class="btn-delete"
                            th:attr="onclick='deleteReview(' + ${review.id} + ')'">删除</button>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="no-data" th:if="${reviewPage} and ${reviewPage.records.size() == 0}"
             style="text-align: center; padding: 40px; color: #999;">暂无评价数据</div>
    </div>

    <div class="pagination" th:if="${reviewPage} and ${reviewPage.pages > 1}">
        <a th:if="${reviewPage.hasPrevious}"
           th:href="@{/admin/review-manage(page=${reviewPage.current - 1}, size=${reviewPage.size}, rating=${ratingFilter})}">上一页</a>
        <span th:unless="${reviewPage.hasPrevious}" class="disabled">上一页</span>

        <span th:each="i : ${#numbers.sequence(1, reviewPage.pages)}"
              th:classappend="${i == reviewPage.current} ? 'active'"
              th:text="${i}"
              th:if="${i == 1 or i == reviewPage.pages or (i >= reviewPage.current - 2 and i <= reviewPage.current + 2)}"
              th:href="@{/admin/review-manage(page=${i}, size=${reviewPage.size}, rating=${ratingFilter})}"></span>

        <a th:if="${reviewPage.hasNext}"
           th:href="@{/admin/review-manage(page=${reviewPage.current + 1}, size=${reviewPage.size}, rating=${ratingFilter})}">下一页</a>
        <span th:unless="${reviewPage.hasNext}" class="disabled">下一页</span>
    </div>
</div>

<!-- 回复弹窗 -->
<div id="replyModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>回复评价</h3>
            <span class="modal-close" onclick="closeReplyModal()">&times;</span>
        </div>
        <div class="modal-body">
            <input type="hidden" id="replyReviewId">
            <textarea id="replyContent" rows="6" placeholder="请输入回复内容..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeReplyModal()" style="background-color: #909399; color: white;">取消</button>
            <button class="btn btn-primary" onclick="submitReply()">提交回复</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // 按评分筛选
    function filterByRating() {
        var rating = document.getElementById('ratingFilter').value;
        if (rating) {
            window.location.href = '/admin/review-manage?rating=' + rating;
        } else {
            window.location.href = '/admin/review-manage';
        }
    }

    // 显示回复弹窗
    function showReplyModal(id, existingReply) {
        document.getElementById('replyReviewId').value = id;
        document.getElementById('replyContent').value = existingReply || '';
        document.getElementById('replyModal').style.display = 'block';
    }

    // 关闭回复弹窗
    function closeReplyModal() {
        document.getElementById('replyModal').style.display = 'none';
    }

    // 提交回复
    function submitReply() {
        var id = document.getElementById('replyReviewId').value;
        var reply = document.getElementById('replyContent').value;

        if (!reply.trim()) {
            alert('回复内容不能为空');
            return;
        }

        fetch('/admin/review/reply', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'id=' + id + '&reply=' + encodeURIComponent(reply)
        })
            .then(res => res.json())
            .then(success => {
                if (success) {
                    alert('回复成功');
                    location.reload();
                } else {
                    alert('回复失败');
                }
                closeReplyModal();
            })
            .catch(err => {
                alert('回复失败：' + err);
            });
    }

    // 删除评价
    function deleteReview(id) {
        if (confirm('确定要删除这条评价吗？此操作不可恢复！')) {
            fetch('/admin/review/delete/' + id, {
                method: 'GET'
            })
                .then(res => res.json())
                .then(success => {
                    if (success) {
                        alert('评价已删除');
                        location.reload();
                    } else {
                        alert('删除失败');
                    }
                })
                .catch(err => {
                    alert('删除失败：' + err);
                });
        }
    }

    // 点击弹窗外部关闭
    window.onclick = function(event) {
        var modal = document.getElementById('replyModal');
        if (event.target == modal) {
            closeReplyModal();
        }
    }
</script>
</body>
</html>
