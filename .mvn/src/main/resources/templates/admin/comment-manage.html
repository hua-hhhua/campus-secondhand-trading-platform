<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论管理 - 校园交易平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin: 0;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .home-link:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            min-width: 150px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background-color: #409EFF;
            color: white;
        }

        .btn-primary:hover {
            background-color: #66b1ff;
        }

        .btn-success {
            background-color: #67c23a;
            color: white;
        }

        .btn-danger {
            background-color: #f56c6c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #f78989;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background-color: #f5f7fa;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ebeef5;
        }

        th {
            font-weight: 600;
            color: #606266;
            white-space: nowrap;
        }

        tr:hover {
            background-color: #f5f7fa;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-0 { background: #fff7e6; color: #fa8c16; }
        .status-1 { background: #f6ffed; color: #52c41a; }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-edit, .btn-delete {
            padding: 5px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }

        .btn-edit {
            background-color: #e6a23c;
            color: white;
        }

        .btn-delete {
            background-color: #f56c6c;
            color: white;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pagination a, .pagination span {
            padding: 8px 15px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            text-decoration: none;
            color: #606266;
            transition: all 0.3s;
        }

        .pagination a:hover {
            color: #409EFF;
            border-color: #c6e2ff;
            background-color: #ecf5ff;
        }

        .pagination .active {
            background-color: #409EFF;
            color: white;
            border-color: #409EFF;
        }

        .content-text {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💬 评论管理</h1>
        <a href="/" class="home-link">🏠 返回首页</a>
    </div>

    <div class="filter-bar">
        <label style="font-weight: 500; color: #555;">状态筛选：</label>
        <select id="statusFilter" onchange="filterByStatus()">
            <option value="">全部状态</option>
            <option value="0" th:selected="${statusFilter == 0}">待审核</option>
            <option value="1" th:selected="${statusFilter == 1}">已通过</option>
        </select>
        <button class="btn btn-danger" onclick="batchDelete()">批量删除</button>
    </div>

    <div class="total-info" style="margin-bottom: 15px; color: #666;">
        共找到 <strong th:text="${commentPage.total}">0</strong> 条评论，当前第 <strong th:text="${commentPage.current}">1</strong> 页
    </div>

    <div class="table-container">
        <table th:if="${commentPage} and ${commentPage.records.size() > 0}">
            <thead>
            <tr>
                <th><input type="checkbox" id="selectAll"></th>
                <th>ID</th>
                <th>评论内容</th>
                <th>评论用户</th>
                <th>文章ID</th>
                <th>父评论ID</th>
                <th>点赞数</th>
                <th>状态</th>
                <th>创建时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="comment : ${commentPage.records}">
                <td><input type="checkbox" class="itemCheckbox" th:value="${comment.id}"></td>
                <td th:text="${comment.id}">?</td>
                <td>
                    <div class="content-text" th:text="${comment.content}" th:title="${comment.content}">?</div>
                </td>
                <td th:text="${comment.username != null ? comment.username : '-'}">?</td>
                <td th:text="${comment.articleId}">?</td>
                <td th:text="${comment.parentId != null ? comment.parentId : '-'}">?</td>
                <td th:text="${comment.likeCount != null ? comment.likeCount : 0}">?</td>
                <td>
                    <span th:if="${comment.status == 0}" class="status-badge status-0">待审核</span>
                    <span th:if="${comment.status == 1}" class="status-badge status-1">已通过</span>
                </td>
                <td th:text="${#temporals.format(comment.createTime, 'yyyy-MM-dd HH:mm:ss')}">?</td>
                <td class="action-buttons">
                    <button th:if="${comment.status == 0}" class="btn-edit"
                            th:attr="onclick='approveComment(' + ${comment.id} + ')'">通过</button>
                    <button class="btn-delete"
                            th:attr="onclick='deleteComment(' + ${comment.id} + ')'">删除</button>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="no-data" th:if="${commentPage} and ${commentPage.records.size() == 0}"
             style="text-align: center; padding: 40px; color: #999;">暂无评论数据</div>
    </div>

    <div class="pagination" th:if="${commentPage} and ${commentPage.pages > 1}">
        <a th:if="${commentPage.hasPrevious}"
           th:href="@{/admin/comment-manage(pageNum=${commentPage.current - 1}, pageSize=${commentPage.size}, statusFilter=${statusFilter})}">上一页</a>
        <span th:unless="${commentPage.hasPrevious}" class="disabled">上一页</span>

        <span th:each="i : ${#numbers.sequence(1, commentPage.pages)}"
              th:classappend="${i == commentPage.current} ? 'active'"
              th:text="${i}"
              th:if="${i == 1 or i == commentPage.pages or (i >= commentPage.current - 2 and i <= commentPage.current + 2)}"
              th:href="@{/admin/comment-manage(pageNum=${i}, pageSize=${commentPage.size}, statusFilter=${statusFilter})}"></span>

        <a th:if="${commentPage.hasNext}"
           th:href="@{/admin/comment-manage(pageNum=${commentPage.current + 1}, pageSize=${commentPage.size}, statusFilter=${statusFilter})}">下一页</a>
        <span th:unless="${commentPage.hasNext}" class="disabled">下一页</span>
    </div>
</div>

<script th:inline="javascript">
    // 全选/取消全选
    document.getElementById('selectAll').addEventListener('change', function() {
        var checkboxes = document.querySelectorAll('.itemCheckbox');
        checkboxes.forEach(function(cb) {
            cb.checked = this.checked;
        }, this);
    });

    // 按状态筛选
    function filterByStatus() {
        var status = document.getElementById('statusFilter').value;
        if (status) {
            window.location.href = '/admin/comment-manage?statusFilter=' + status;
        } else {
            window.location.href = '/admin/comment-manage';
        }
    }

    // 通过评论
    function approveComment(id) {
        if (confirm('确定要通过这条评论吗？')) {
            fetch('/admin/comment/status/' + id, {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'status=1'
            })
                .then(res => res.json())
                .then(success => {
                    if (success) {
                        alert('评论已通过审核');
                        location.reload();
                    } else {
                        alert('操作失败');
                    }
                })
                .catch(err => {
                    alert('操作失败：' + err);
                });
        }
    }

    // 删除评论
    function deleteComment(id) {
        if (confirm('确定要删除这条评论吗？此操作不可恢复！')) {
            fetch('/admin/comment/delete/' + id, {
                method: 'GET'
            })
                .then(res => res.json())
                .then(success => {
                    if (success) {
                        alert('评论已删除');
                        location.reload();
                    } else {
                        alert('删除失败');
                    }
                })
                .catch(err => {
                    alert('删除失败：' + err);
                });
        }
    }

    // 批量删除
    function batchDelete() {
        var checkboxes = document.querySelectorAll('.itemCheckbox:checked');
        if (checkboxes.length === 0) {
            alert('请至少选择一条数据');
            return;
        }

        if (confirm('确定要删除选中的 ' + checkboxes.length + ' 条评论吗？此操作不可恢复！')) {
            var ids = [];
            checkboxes.forEach(function(cb) {
                ids.push(cb.value);
            });

            Promise.all(ids.map(function(id) {
                return fetch('/admin/comment/delete/' + id, {
                    method: 'GET'
                }).then(res => res.json());
            }))
                .then(results => {
                    var successCount = results.filter(r => r).length;
                    alert('成功删除 ' + successCount + ' 条评论');
                    location.reload();
                })
                .catch(err => {
                    alert('删除失败：' + err);
                });
        }
    }
</script>
</body>
</html>
