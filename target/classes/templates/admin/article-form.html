<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布商品</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .header h1 { color: #333; font-size: 24px; }
    .header a { color: #667eea; text-decoration: none; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #555; font-size: 14px; }
    .form-group label .required { color: #f56c6c; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: #667eea;
    }
    .form-group textarea { min-height: 150px; resize: vertical; }
    .form-row { display: flex; gap: 20px; }
    .form-row .form-group { flex: 1; }
    .btn { padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5a6fd6; }
    .btn-secondary { background: #909399; color: white; }
    .btn-secondary:hover { background: #a6a9ad; }
    .btn-success { background: #67c23a; color: white; }
    .btn-success:hover { background: #5daf34; }
    .btn-group { display: flex; gap: 15px; margin-top: 10px; flex-wrap: wrap; }
    .checkbox-group { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
    .checkbox-group label { display: flex; align-items: center; gap: 6px; font-weight: normal; cursor: pointer; }
    .checkbox-group input[type="checkbox"] { width: auto; }
    .help-text { font-size: 12px; color: #999; margin-top: 4px; }
    .tag-group { display: flex; gap: 10px; flex-wrap: wrap; padding-top: 5px; }
    .tag-group label {
      display: flex; align-items: center; gap: 4px; font-weight: normal;
      cursor: pointer; padding: 4px 12px; background: #f0f2f5;
      border-radius: 15px; transition: all 0.3s; user-select: none;
    }
    .tag-group label:hover { background: #e0e4ea; }
    .tag-group label.tag-selected {
      background: #667eea; color: white;
    }
    .tag-group label input[type="checkbox"] { display: none; }
    .image-preview { margin-top: 10px; display: none; }
    .image-preview img { max-width: 200px; max-height: 200px; border-radius: 6px; border: 1px solid #ddd; }
    .upload-area { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
    .upload-area input[type="file"] { padding: 8px; border: 1px solid #ddd; border-radius: 6px; flex: 1; min-width: 150px; }
    .upload-area .btn-upload { padding: 8px 20px; background: #67c23a; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .upload-area .btn-upload:hover { background: #5daf34; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📝 <span th:text="${article.id != null} ? '编辑商品' : '发布商品'">发布商品</span></h1>
    <a href="/admin/articles">← 返回列表</a>
  </div>

  <form th:action="@{/admin/articles/save}" method="post" enctype="multipart/form-data">
    <input type="hidden" name="id" th:value="${article.id}">

    <div class="form-group">
      <label>商品标题 <span class="required">*</span></label>
      <input type="text" name="title" th:value="${article.title}" placeholder="请输入商品标题" required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>分类 <span class="required">*</span></label>
        <select name="categoryId" required>
          <option value="">请选择分类</option>
          <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == article.categoryId}"></option>
        </select>
      </div>
      <div class="form-group">
        <label>价格（元） <span class="required">*</span></label>
        <input type="number" name="price" th:value="${article.price}" step="0.01" min="0" placeholder="0.00" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>库存 <span class="required">*</span></label>
        <input type="number" name="stock" th:value="${article.stock}" min="1" placeholder="数量" required>
      </div>
      <div class="form-group">
        <label>所在学校 <span class="required">*</span></label>
        <select name="schoolId" required>
          <option value="">请选择学校</option>
          <option th:each="school : ${schools}" th:value="${school.id}" th:text="${school.name}" th:selected="${school.id == article.schoolId}"></option>
        </select>
      </div>
    </div>

    <!-- 标签选择 -->
    <div class="form-group">
      <label>商品标签</label>
      <div class="tag-group">
        <label th:each="tag : ${tags}"
               th:classappend="${article.tagIds != null and article.tagIds.contains(tag.id)} ? 'tag-selected' : ''">
          <input type="checkbox" name="tagIds" th:value="${tag.id}"
                 th:checked="${article.tagIds != null and article.tagIds.contains(tag.id)}">
          <span th:text="${tag.name}"></span>
        </label>
      </div>
      <div class="help-text">点击选择标签，可多选</div>
    </div>

    <!-- ========== 商品图片上传 ========== -->
    <div class="form-group">
      <label>商品图片</label>
      <div class="upload-area">
        <input type="file" id="coverImageFile" accept="image/*">
        <button type="button" class="btn-upload" onclick="uploadImage()">📤 上传图片</button>
      </div>
      <div class="image-preview" id="imagePreview" th:if="${article.coverImage != null and article.coverImage != ''}" style="display: block;">
        <img id="previewImg" th:src="${article.coverImage}" alt="商品图片">
        <input type="hidden" id="coverImageInput" name="coverImage" th:value="${article.coverImage}">
        <div style="margin-top: 5px;">
          <button type="button" onclick="removeImage()" style="padding: 4px 12px; background: #f56c6c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">删除图片</button>
        </div>
      </div>
      <div class="image-preview" id="imagePreviewNew" style="display: none;">
        <img id="previewImgNew" style="max-width: 200px; max-height: 200px; border-radius: 6px; border: 1px solid #ddd;">
        <input type="hidden" id="coverImageInputNew" name="coverImage">
        <div style="margin-top: 5px;">
          <button type="button" onclick="removeNewImage()" style="padding: 4px 12px; background: #f56c6c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">删除图片</button>
        </div>
      </div>
      <div class="help-text">支持 jpg、png、gif 格式，建议尺寸 800x800，大小不超过 5MB</div>
    </div>

    <div class="form-group">
      <label>交易地点</label>
      <input type="text" name="location" th:value="${article.location}" placeholder="如：信息学部学生宿舍">
    </div>

    <!-- ========== 联系方式 ========== -->
    <div class="form-group">
      <label>联系方式 <span class="required">*</span></label>
      <div style="display: flex; gap: 15px; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 150px;">
          <input type="text" id="wechat" name="wechat" th:value="${article.wechat}" placeholder="微信号" style="width:100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" oninput="checkContact()">
        </div>
        <div style="flex: 1; min-width: 150px;">
          <input type="text" id="qq" name="qq" th:value="${article.qq}" placeholder="QQ号" style="width:100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" oninput="checkContact()">
        </div>
        <div style="flex: 1; min-width: 150px;">
          <input type="text" id="phone" name="phone" th:value="${article.phone}" placeholder="手机号" style="width:100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" oninput="checkContact()">
        </div>
      </div>
      <div id="contactError" class="help-text" style="color: #f56c6c; display: none;">请至少填写一种联系方式（微信/QQ/手机号）</div>
      <div class="help-text">微信、QQ、手机号至少填写一个，方便买家联系您</div>
    </div>

    <div class="form-group">
      <label>商品描述 <span class="required">*</span></label>
      <textarea name="content" placeholder="请详细描述商品情况" required th:text="${article.content}"></textarea>
    </div>

    <div class="form-group">
      <label>商品状态</label>
      <select name="status">
        <option value="1" th:selected="${article.status == 1 || article.status == null}">立即发布</option>
        <option value="0" th:selected="${article.status == 0}">保存草稿</option>
        <option value="2" th:selected="${article.status == 2}">定时发布</option>
      </select>
    </div>

    <div class="form-group" th:if="${article.status == 2}">
      <label>定时发布时间</label>
      <input type="datetime-local" name="publishedAt" th:value="${article.publishedAt != null ? #temporals.format(article.publishedAt, 'yyyy-MM-dd\'T\'HH:mm') : ''}">
    </div>

    <!-- 选项：置顶 + 允许评论 -->
    <div class="form-group">
      <label>选项</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="isTop" value="1" th:checked="${article.isTop == 1}"> 🔝 置顶（我的商品列表优先显示）</label>
        <label><input type="checkbox" name="allowComment" value="1" th:checked="${article.allowComment == 1 || article.allowComment == null}"> 💬 允许评论</label>
      </div>
      <div class="help-text">置顶后在你的商品列表中靠前显示</div>
    </div>

    <div class="btn-group">
      <button type="submit" class="btn btn-primary">✅ 确定</button>
      <a href="/admin/articles" class="btn btn-secondary">取消</a>
    </div>
  </form>
</div>

<script>
  // ========== 标签点击切换 ==========
  document.querySelectorAll('.tag-group label').forEach(function(label) {
    label.addEventListener('click', function(e) {
      if (e.target.tagName === 'INPUT') {
        return;
      }
      var checkbox = this.querySelector('input[type="checkbox"]');
      checkbox.checked = !checkbox.checked;
      this.classList.toggle('tag-selected');
    });
  });

  // ========== 联系方式校验 ==========
  function checkContact() {
    var wechat = document.getElementById('wechat').value.trim();
    var qq = document.getElementById('qq').value.trim();
    var phone = document.getElementById('phone').value.trim();
    var errorEl = document.getElementById('contactError');

    if (wechat || qq || phone) {
      errorEl.style.display = 'none';
    } else {
      errorEl.style.display = 'block';
    }
  }

  // 页面加载时执行一次
  document.addEventListener('DOMContentLoaded', function() {
    checkContact();
  });

  // 表单提交前再次校验
  document.querySelector('form').addEventListener('submit', function(e) {
    var wechat = document.getElementById('wechat').value.trim();
    var qq = document.getElementById('qq').value.trim();
    var phone = document.getElementById('phone').value.trim();

    if (!wechat && !qq && !phone) {
      e.preventDefault();
      document.getElementById('contactError').style.display = 'block';
      alert('请至少填写一种联系方式（微信/QQ/手机号）');
      return false;
    }
  });

  // ========== 图片上传 ==========
  function uploadImage() {
    var fileInput = document.getElementById('coverImageFile');
    var file = fileInput.files[0];
    if (!file) {
      alert('请先选择图片文件');
      return;
    }

    // 验证文件类型
    if (!file.type.startsWith('image/')) {
      alert('请上传图片文件');
      return;
    }

    // 验证文件大小（限制5MB）
    if (file.size > 5 * 1024 * 1024) {
      alert('图片大小不能超过5MB');
      return;
    }

    var formData = new FormData();
    formData.append('file', file);

    fetch('/admin/articles/upload-image', {
      method: 'POST',
      body: formData
    })
            .then(function(res) { return res.json(); })
            .then(function(data) {
              if (data.success) {
                document.getElementById('coverImageInputNew').value = data.imagePath;
                document.getElementById('previewImgNew').src = data.imagePath;
                document.getElementById('imagePreviewNew').style.display = 'block';
                alert('图片上传成功！');
              } else {
                alert('上传失败：' + data.message);
              }
            })
            .catch(function() {
              alert('上传失败，请重试');
            });
  }

  function removeNewImage() {
    document.getElementById('coverImageInputNew').value = '';
    document.getElementById('previewImgNew').src = '';
    document.getElementById('imagePreviewNew').style.display = 'none';
    document.getElementById('coverImageFile').value = '';
  }

  function removeImage() {
    document.getElementById('coverImageInput').value = '';
    document.getElementById('previewImg').src = '';
    document.getElementById('imagePreview').style.display = 'none';
  }
</script>
</body>
</html>
