<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background-color: #f5f5f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        h1 { color: #333; font-size: 28px; margin: 0; }
        .home-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; border-radius: 30px; font-size: 14px; transition: all 0.3s; }
        .home-link:hover { opacity: 0.9; transform: translateY(-2px); }
        .search-form { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; align-items: center; }
        .form-group { display: flex; align-items: center; gap: 8px; }
        .form-group label { font-weight: 500; color: #555; }
        .form-control { padding: 10px 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; min-width: 200px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: all 0.3s; text-decoration: none; display: inline-block; }
        .btn-primary { background-color: #409EFF; color: white; }
        .btn-primary:hover { background-color: #66b1ff; }
        .btn-reset { background-color: #909399; color: white; }
        .btn-add { background-color: #67c23a; color: white; }
        .btn-danger { background-color: #f56c6c; color: white; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        thead { background-color: #f5f7fa; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ebeef5; }
        th { font-weight: 600; color: #606266; }
        tr:hover { background-color: #f5f7fa; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 30px; flex-wrap: wrap; }
        .pagination a, .pagination span { padding: 8px 15px; border: 1px solid #dcdfe6; border-radius: 4px; text-decoration: none; color: #606266; transition: all 0.3s; }
        .pagination a:hover { color: #409EFF; border-color: #c6e2ff; background-color: #ecf5ff; }
        .pagination .active { background-color: #409EFF; color: white; border-color: #409EFF; }
        .action-buttons { display: flex; gap: 10px; }
        .btn-edit, .btn-delete { padding: 5px 12px; border-radius: 4px; text-decoration: none; font-size: 12px; }
        .btn-edit { background-color: #e6a23c; color: white; }
        .btn-delete { background-color: #f56c6c; color: white; }
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; width: 500px; border-radius: 8px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-close { font-size: 24px; cursor: pointer; color: #999; }
        .modal-body .form-item { margin-bottom: 15px; }
        .modal-body label { display: block; margin-bottom: 5px; font-weight: 500; color: #555; }
        .modal-body input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏫 学校管理</h1>
        <a href="/" class="home-link">🏠 返回首页</a>
    </div>

    <form class="search-form" method="get" action="/admin/schools">
        <div class="form-group">
            <label for="keyword">关键词：</label>
            <input type="text" id="keyword" name="keyword" class="form-control" placeholder="请输入学校名称或城市" th:value="${keyword}">
        </div>
        <button type="submit" class="btn btn-primary">查询</button>
        <button type="button" class="btn btn-reset" onclick="resetForm()">重置</button>
        <button type="button" class="btn btn-add" onclick="showAddModal()">+ 新增学校</button>
        <button type="button" class="btn btn-danger" id="batchDeleteBtn">批量删除</button>
    </form>

    <div class="total-info" th:if="${schoolPage}">
        共找到 <strong th:text="${schoolPage.total}">0</strong> 所学校，当前第 <strong th:text="${schoolPage.current}">1</strong> 页
    </div>

    <div class="table-container">
        <table th:if="${schoolPage} and ${schoolPage.records.size() > 0}">
            <thead>
            <tr>
                <th><input type="checkbox" id="selectAll"></th>
                <th>ID</th>
                <th>学校名称</th>
                <th>所在城市</th>
                <th>创建时间</th>
                <th>更新时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="school : ${schoolPage.records}">
                <td><input type="checkbox" class="itemCheckbox" th:value="${school.id}"></td>
                <td th:text="${school.id}">?</td>
                <td th:text="${school.name}" style="font-weight: 500;">?</td>
                <td th:text="${school.city}">?</td>
                <td th:text="${#temporals.format(school.createTime, 'yyyy-MM-dd HH:mm:ss')}">?</td>
                <td th:text="${#temporals.format(school.updateTime, 'yyyy-MM-dd HH:mm:ss')}">?</td>
                <td class="action-buttons">
                    <a href="#" class="btn-edit" th:attr="onclick='showEditModal(' + ${school.id} + ', \'' + ${school.name} + '\', \'' + ${school.city} + '\')'">编辑</a>
                    <a href="#" class="btn-delete" th:attr="onclick='deleteSchool(' + ${school.id} + ')'">删除</a>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="no-data" th:if="${schoolPage} and ${schoolPage.records.size() == 0}" style="text-align: center; padding: 40px; color: #999;">暂无学校数据</div>
    </div>

    <div class="pagination" th:if="${schoolPage} and ${schoolPage.pages > 1}">
        <a th:if="${schoolPage.hasPrevious}" th:href="@{/admin/schools(page=${schoolPage.current - 1}, size=${schoolPage.size}, keyword=${keyword})}">上一页</a>
        <span th:unless="${schoolPage.hasPrevious}" class="disabled">上一页</span>
        <a th:each="i : ${#numbers.sequence(1, schoolPage.pages)}" th:classappend="${i == schoolPage.current} ? 'active'" th:text="${i}" th:href="@{/admin/schools(page=${i}, size=${schoolPage.size}, keyword=${keyword})}"></a>
        <a th:if="${schoolPage.hasNext}" th:href="@{/admin/schools(page=${schoolPage.current + 1}, size=${schoolPage.size}, keyword=${keyword})}">下一页</a>
        <span th:unless="${schoolPage.hasNext}" class="disabled">下一页</span>
    </div>
</div>

<div id="schoolModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">新增学校</h3>
            <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
            <input type="hidden" id="schoolId">
            <div class="form-item">
                <label>学校名称 *</label>
                <input type="text" id="schoolName" required>
            </div>
            <div class="form-item">
                <label>所在城市</label>
                <input type="text" id="schoolCity">
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-reset" onclick="closeModal()">取消</button>
            <button type="button" class="btn btn-primary" onclick="saveSchool()">保存</button>
        </div>
    </div>
</div>

<script>
    function resetForm() {
        document.getElementById('keyword').value = '';
        window.location.href = '/admin/schools';
    }

    var selectAll = document.getElementById('selectAll');
    if (selectAll) {
        selectAll.addEventListener('change', function() {
            var checkboxes = document.querySelectorAll('.itemCheckbox');
            checkboxes.forEach(function(cb) { cb.checked = this.checked; }, this);
        });
    }

    var batchDeleteBtn = document.getElementById('batchDeleteBtn');
    if (batchDeleteBtn) {
        batchDeleteBtn.addEventListener('click', function() {
            var checkboxes = document.querySelectorAll('.itemCheckbox:checked');
            if (checkboxes.length === 0) { alert('请至少选择一条数据'); return; }
            var ids = [];
            checkboxes.forEach(function(cb) { ids.push(cb.value); });
            if (confirm('确定要删除选中的 ' + ids.length + ' 所学校吗？')) {
                fetch('/admin/schools/delete-batch', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(ids)
                }).then(res => res.json()).then(success => {
                    if (success) { alert('删除成功'); location.reload(); }
                    else { alert('删除失败'); }
                });
            }
        });
    }

    function showAddModal() {
        document.getElementById('modalTitle').textContent = '新增学校';
        document.getElementById('schoolId').value = '';
        document.getElementById('schoolName').value = '';
        document.getElementById('schoolCity').value = '';
        document.getElementById('schoolModal').style.display = 'block';
    }

    function showEditModal(id, name, city) {
        document.getElementById('modalTitle').textContent = '编辑学校';
        document.getElementById('schoolId').value = id;
        document.getElementById('schoolName').value = name;
        document.getElementById('schoolCity').value = city || '';
        document.getElementById('schoolModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('schoolModal').style.display = 'none';
    }

    function saveSchool() {
        var id = document.getElementById('schoolId').value;
        var data = {
            name: document.getElementById('schoolName').value,
            city: document.getElementById('schoolCity').value
        };
        if (!data.name) { alert('请填写学校名称'); return; }

        var url = id ? '/admin/schools/update' : '/admin/schools/add';
        if (id) data.id = parseInt(id);

        fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(res => res.json()).then(success => {
            if (success) { alert('保存成功'); location.reload(); }
            else { alert('保存失败'); }
        });
    }

    function deleteSchool(id) {
        if (confirm('确定要删除该学校吗？')) {
            fetch('/admin/schools/delete/' + id, {method: 'POST'}).then(res => res.json()).then(success => {
                if (success) { alert('删除成功'); location.reload(); }
                else { alert('删除失败'); }
            });
        }
    }
</script>
</body>
</html>
