<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background-color: #f5f5f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        h1 { color: #333; font-size: 28px; margin: 0; }
        .home-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; border-radius: 30px; font-size: 14px; transition: all 0.3s; }
        .home-link:hover { opacity: 0.9; transform: translateY(-2px); }
        .search-form { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; align-items: center; }
        .form-group { display: flex; align-items: center; gap: 8px; }
        .form-group label { font-weight: 500; color: #555; }
        .form-control { padding: 10px 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; min-width: 150px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: all 0.3s; text-decoration: none; display: inline-block; }
        .btn-primary { background-color: #409EFF; color: white; }
        .btn-primary:hover { background-color: #66b1ff; }
        .btn-reset { background-color: #909399; color: white; }
        .btn-success { background-color: #67c23a; color: white; }
        .btn-warning { background-color: #e6a23c; color: white; }
        .btn-danger { background-color: #f56c6c; color: white; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        thead { background-color: #f5f7fa; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ebeef5; }
        th { font-weight: 600; color: #606266; }
        tr:hover { background-color: #f5f7fa; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .status-pending { background-color: #fdf6ec; color: #e6a23c; }
        .status-approved { background-color: #e1f3d8; color: #67c23a; }
        .status-rejected { background-color: #fef0f0; color: #f56c6c; }
        .content-cell { max-width: 300px; word-break: break-word; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 30px; flex-wrap: wrap; }
        .pagination a, .pagination span { padding: 8px 15px; border: 1px solid #dcdfe6; border-radius: 4px; text-decoration: none; color: #606266; transition: all 0.3s; }
        .pagination a:hover { color: #409EFF; border-color: #c6e2ff; background-color: #ecf5ff; }
        .pagination .active { background-color: #409EFF; color: white; border-color: #409EFF; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1> 评论管理</h1>
        <a href="/" class="home-link">🏠 返回首页</a>
    </div>

    <form class="search-form" method="get" action="/admin/comments">
        <div class="form-group">
            <label for="status">状态：</label>
            <select id="status" name="status" class="form-control">
                <option value="">全部</option>
                <option value="0" th:selected="${status == '0'}">待审核</option>
                <option value="1" th:selected="${status == '1'}">已通过</option>
                <option value="2" th:selected="${status == '2'}">已拒绝</option>
            </select>
        </div>
        <div class="form-group">
            <label for="articleId">文章ID：</label>
            <input type="number" id="articleId" name="articleId" class="form-control" placeholder="输入文章ID" th:value="${articleId}">
        </div>
        <button type="submit" class="btn btn-primary">查询</button>
        <button type="button" class="btn btn-reset" onclick="resetForm()">重置</button>
        <button type="button" class="btn btn-danger" id="batchDeleteBtn">批量删除</button>
    </form>

    <div class="total-info" th:if="${commentPage}">
        共找到 <strong th:text="${commentPage.total}">0</strong> 条评论，当前第 <strong th:text="${commentPage.current}">1</strong> 页
    </div>

    <div class="table-container">
        <table th:if="${commentPage} and ${commentPage.records.size() > 0}">
            <thead>
            <tr>
                <th><input type="checkbox" id="selectAll"></th>
                <th>ID</th>
                <th>文章ID</th>
                <th>用户ID</th>
                <th>评论内容</th>
                <th>父评论ID</th>
                <th>点赞数</th>
                <th>状态</th>
                <th>创建时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="comment : ${commentPage.records}">
                <td><input type="checkbox" class="itemCheckbox" th:value="${comment.id}"></td>
                <td th:text="${comment.id}">?</td>
                <td><a th:href="@{/article/{id}(id=${comment.articleId})}" target="_blank" th:text="${comment.articleId}">?</a></td>
                <td th:text="${comment.userId}">?</td>
                <td class="content-cell" th:text="${comment.content}">?</td>
                <td th:text="${comment.parentId}">?</td>
                <td th:text="${comment.likeCount}">?</td>
                <td>
                    <span class="status-badge" th:classappend="${comment.status == 0} ? 'status-pending' : (${comment.status == 1} ? 'status-approved' : 'status-rejected')"
                          th:text="${comment.status == 0} ? '待审核' : (${comment.status == 1} ? '已通过' : '已拒绝')">
                    </span>
                </td>
                <td th:text="${#temporals.format(comment.createTime, 'yyyy-MM-dd HH:mm:ss')}">?</td>
                <td class="action-buttons">
                    <a href="#" class="btn btn-success btn-sm" th:if="${comment.status != 1}" th:attr="onclick='approveComment(' + ${comment.id} + ')'">通过</a>
                    <a href="#" class="btn btn-warning btn-sm" th:if="${comment.status != 2}" th:attr="onclick='rejectComment(' + ${comment.id} + ')'">拒绝</a>
                    <a href="#" class="btn btn-danger btn-sm" th:attr="onclick='deleteComment(' + ${comment.id} + ')'">删除</a>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="no-data" th:if="${commentPage} and ${commentPage.records.size() == 0}" style="text-align: center; padding: 40px; color: #999;">暂无评论数据</div>
    </div>

    <div class="pagination" th:if="${commentPage} and ${commentPage.pages > 1}">
        <a th:if="${commentPage.hasPrevious}" th:href="@{/admin/comments(page=${commentPage.current - 1}, size=${commentPage.size}, status=${status}, articleId=${articleId})}">上一页</a>
        <span th:unless="${commentPage.hasPrevious}" class="disabled">上一页</span>
        <a th:each="i : ${#numbers.sequence(1, commentPage.pages)}" th:classappend="${i == commentPage.current} ? 'active'" th:text="${i}" th:href="@{/admin/comments(page=${i}, size=${commentPage.size}, status=${status}, articleId=${articleId})}"></a>
        <a th:if="${commentPage.hasNext}" th:href="@{/admin/comments(page=${commentPage.current + 1}, size=${commentPage.size}, status=${status}, articleId=${articleId})}">下一页</a>
        <span th:unless="${commentPage.hasNext}" class="disabled">下一页</span>
    </div>
</div>

<script>
    function resetForm() {
        document.getElementById('status').value = '';
        document.getElementById('articleId').value = '';
        window.location.href = '/admin/comments';
    }

    var selectAll = document.getElementById('selectAll');
    if (selectAll) {
        selectAll.addEventListener('change', function() {
            var checkboxes = document.querySelectorAll('.itemCheckbox');
            checkboxes.forEach(function(cb) { cb.checked = this.checked; }, this);
        });
    }

    var batchDeleteBtn = document.getElementById('batchDeleteBtn');
    if (batchDeleteBtn) {
        batchDeleteBtn.addEventListener('click', function() {
            var checkboxes = document.querySelectorAll('.itemCheckbox:checked');
            if (checkboxes.length === 0) { alert('请至少选择一条数据'); return; }
            var ids = [];
            checkboxes.forEach(function(cb) { ids.push(cb.value); });
            if (confirm('确定要删除选中的 ' + ids.length + ' 条评论吗？')) {
                fetch('/admin/comments/delete-batch', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(ids)
                }).then(res => res.json()).then(success => {
                    if (success) { alert('删除成功'); location.reload(); }
                    else { alert('删除失败'); }
                });
            }
        });
    }

    function approveComment(id) {
        if (confirm('确定要通过该评论吗？')) {
            fetch('/admin/comments/approve/' + id, {method: 'POST'}).then(res => res.json()).then(success => {
                if (success) { alert('审核通过'); location.reload(); }
                else { alert('操作失败'); }
            });
        }
    }

    function rejectComment(id) {
        if (confirm('确定要拒绝该评论吗？')) {
            fetch('/admin/comments/reject/' + id, {method: 'POST'}).then(res => res.json()).then(success => {
                if (success) { alert('已拒绝'); location.reload(); }
                else { alert('操作失败'); }
            });
        }
    }

    function deleteComment(id) {
        if (confirm('确定要删除该评论吗？')) {
            fetch('/admin/comments/delete/' + id, {method: 'POST'}).then(res => res.json()).then(success => {
                if (success) { alert('删除成功'); location.reload(); }
                else { alert('删除失败'); }
            });
        }
    }
</script>
</body>
</html>
