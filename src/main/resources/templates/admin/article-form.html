<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品编辑</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #555;
      font-size: 14px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .form-group textarea {
      min-height: 100px;
    }

    .form-row {
      display: flex;
      gap: 20px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .tag-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tag-item {
      padding: 6px 16px;
      background: #f0f2f5;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      border: 2px solid transparent;
    }

    .tag-item.selected {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .tag-item input {
      display: none;
    }

    .btn-group {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .btn {
      padding: 14px 35px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #666;
      border: 1px solid #ddd;
    }

    .schedule-time-group {
      display: none;
    }

    .schedule-time-group.show {
      display: block;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 th:text="${article.id != null} ? '编辑商品' : '发布商品'">发布商品</h1>
    <form th:action="${isAdmin} ? @{/admin/articles/save} : @{/article/save}" method="post"
      enctype="multipart/form-data">
      <input type="hidden" name="id" th:value="${article.id}">
      <div class="form-group">
        <label>商品标题 *</label>
        <input type="text" name="title" th:value="${article.title}" placeholder="请输入商品标题" required>
      </div>
      <div class="form-group">
        <label>商品封面图片</label>
        <div id="imageUploadArea"
          style="border: 2px dashed #ddd; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: border-color 0.3s;">
          <div id="uploadPlaceholder">
            <div style="font-size: 48px; margin-bottom: 10px;">📷</div>
            <div style="color: #999; font-size: 14px;">点击或拖拽上传图片</div>
          </div>
          <img id="previewImage" th:src="${article.coverImage != null ? article.coverImage : ''}"
            style="max-width: 300px; max-height: 200px; display: none; margin: 0 auto; border-radius: 4px;">
          <button id="removeImageBtn" type="button"
            style="display: none; margin-top: 10px; padding: 5px 15px; background: #ff4757; color: white; border: none; border-radius: 4px; cursor: pointer;"
            onclick="removeImage()">删除图片</button>
        </div>
        <input type="hidden" name="coverImage" id="coverImageInput" th:value="${article.coverImage}">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>分类 *</label>
          <select name="categoryId" required>
            <option value="">请选择分类</option>
            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
              th:selected="${cat.id == article.categoryId}"></option>
          </select>
        </div>
        <div class="form-group">
          <label>价格（元）*</label>
          <input type="number" name="price" th:value="${article.price}" step="0.01" min="0" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>库存 *</label>
          <input type="number" name="stock" th:value="${article.stock}" min="1" required>
        </div>
        <div class="form-group">
          <label>所在学校 *</label>
          <select name="schoolId" required>
            <option value="">请选择学校</option>
            <option th:each="school : ${schools}" th:value="${school.id}" th:text="${school.name}"
              th:selected="${school.id == article.schoolId}"></option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>商品标签</label>
        <div class="tag-group">
          <label th:each="tag : ${tags}" class="tag-item"
            th:classappend="${article.tagIds != null and #lists.contains(article.tagIds, tag.id)} ? 'selected' : ''"
            onclick="toggleTag(this)">
            <input type="checkbox" name="tagIds" th:value="${tag.id}"
              th:checked="${article.tagIds != null and #lists.contains(article.tagIds, tag.id)}">
            <span th:text="${tag.name}"></span>
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>交易地点</label>
        <input type="text" name="location" th:value="${article.location}" placeholder="如：信息学部学生宿舍">
      </div>
      <div class="form-group">
        <label>联系方式 *</label>
        <div style="display:flex; gap:15px; flex-wrap:wrap;">
          <input type="text" name="wechat" th:value="${article.wechat}" placeholder="微信号"
            style="flex:1; min-width:150px; padding:10px; border:1px solid #ddd; border-radius:6px;">
          <input type="text" name="qq" th:value="${article.qq}" placeholder="QQ号"
            style="flex:1; min-width:150px; padding:10px; border:1px solid #ddd; border-radius:6px;">
          <input type="text" name="phone" th:value="${article.phone}" placeholder="手机号"
            style="flex:1; min-width:150px; padding:10px; border:1px solid #ddd; border-radius:6px;">
        </div>
      </div>
      <div class="form-group">
        <label>商品描述 *</label>
        <textarea name="content" placeholder="请详细描述商品情况" required th:text="${article.content}"></textarea>
      </div>
      <div class="form-group">
        <label>发布状态 *</label>
        <select name="status" id="publishStatus" onchange="togglePublishTime()">
          <option value="1" th:selected="${article.status == 1 || article.status == null}">立即发布</option>
          <option value="0" th:selected="${article.status == 0}">保存草稿</option>
          <option value="2" th:selected="${article.status == 2}">定时发布</option>
        </select>
      </div>
      <div id="scheduleTimeGroup" class="form-group schedule-time-group"
        th:classappend="${article.status == 2} ? 'show' : ''">
        <label>定时发布时间 *</label>
        <input type="datetime-local" name="scheduledTime"
          th:value="${article.publishedAt != null ? #temporals.format(article.publishedAt, 'yyyy-MM-dd''T''HH:mm') : ''}">
      </div>
      <div class="form-group">
        <label>选项</label>
        <label><input type="checkbox" name="isTop" value="1" th:checked="${article.isTop == 1}"> 置顶</label>
        <label><input type="checkbox" name="allowComment" value="1"
            th:checked="${article.allowComment == 1 or article.allowComment == null}"> 允许评论</label>
        <label><input type="checkbox" name="sendEmail" value="1" th:checked="${article.sendEmail == 1}"> 发送邮件通知</label>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary">提交保存</button>
        <a th:href="${isAdmin} ? '/admin/articles' : '/article/manage'" class="btn btn-secondary">取消</a>
      </div>
    </form>
  </div>
  <script>
    // 图片上传相关
    var uploadArea = document.getElementById('imageUploadArea');
    var uploadPlaceholder = document.getElementById('uploadPlaceholder');
    var previewImage = document.getElementById('previewImage');
    var removeImageBtn = document.getElementById('removeImageBtn');
    var coverImageInput = document.getElementById('coverImageInput');

    // 初始化已有图片
    if (coverImageInput.value) {
      uploadPlaceholder.style.display = 'none';
      previewImage.style.display = 'block';
      if (removeImageBtn) {
        removeImageBtn.style.display = 'block';
      }
    }

    // 创建隐藏的文件输入
    var fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);

    // 点击上传区域
    uploadArea.addEventListener('click', function (e) {
      if (e.target !== removeImageBtn && !e.target.classList.contains('btn')) {
        fileInput.click();
      }
    });

    // 监听文件选择
    fileInput.addEventListener('change', function (e) {
      var file = e.target.files[0];
      if (!file) return;

      if (!file.type.startsWith('image/')) {
        alert('只能上传图片文件');
        return;
      }

      if (file.size > 5 * 1024 * 1024) {
        alert('图片大小不能超过 5MB');
        return;
      }

      uploadImage(file);
    });

    // 拖拽上传
    uploadArea.addEventListener('dragover', function (e) {
      e.preventDefault();
      uploadArea.style.borderColor = '#667eea';
    });

    uploadArea.addEventListener('dragleave', function (e) {
      e.preventDefault();
      uploadArea.style.borderColor = '#ddd';
    });

    uploadArea.addEventListener('drop', function (e) {
      e.preventDefault();
      uploadArea.style.borderColor = '#ddd';
      var files = e.dataTransfer.files;
      if (files.length > 0) {
        var file = files[0];
        if (file.type.startsWith('image/') && file.size <= 5 * 1024 * 1024) {
          uploadImage(file);
        } else {
          alert('请上传图片文件，大小不超过5MB');
        }
      }
    });

    // 上传图片
    async function uploadImage(file) {
      var formData = new FormData();
      formData.append('file', file);

      uploadPlaceholder.innerHTML = '<div style="font-size: 48px; margin-bottom: 10px;">📷</div><div style="color: #667eea;">上传中...</div>';

      try {
        var response = await fetch('/article/upload-image', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }

        var responseText = await response.text();
        responseText = responseText.trim();

        console.log('响应内容:', responseText);

        var result = JSON.parse(responseText);

        if (result.success) {
          coverImageInput.value = result.imagePath;
          previewImage.src = result.imagePath;
          uploadPlaceholder.style.display = 'none';
          previewImage.style.display = 'block';
          if (removeImageBtn) {
            removeImageBtn.style.display = 'block';
          }
          uploadArea.style.borderColor = '#ddd';
        } else {
          alert(result.message || '上传失败');
          uploadPlaceholder.innerHTML = '<div style="font-size: 48px; margin-bottom: 10px;">📷</div><div style="color: #999; font-size: 14px;">点击或拖拽上传图片</div>';
        }
      } catch (error) {
        console.error('上传失败:', error);
        alert('上传失败：' + error.message);
        uploadPlaceholder.innerHTML = '<div style="font-size: 48px; margin-bottom: 10px;">📷</div><div style="color: #999; font-size: 14px;">点击或拖拽上传图片</div>';
      }
    }

    // 删除图片
    function removeImage() {
      coverImageInput.value = '';
      previewImage.style.display = 'none';
      if (removeImageBtn) {
        removeImageBtn.style.display = 'none';
      }
      uploadPlaceholder.style.display = 'block';
      uploadPlaceholder.innerHTML = '<div style="font-size: 48px; margin-bottom: 10px;">📷</div><div style="color: #999; font-size: 14px;">点击或拖拽上传图片</div>';
      fileInput.value = '';
    }

    function toggleTag(label) {
      var checkbox = label.querySelector('input[type="checkbox"]');
      checkbox.checked = !checkbox.checked;
      if (checkbox.checked) {
        label.classList.add('selected');
      } else {
        label.classList.remove('selected');
      }
    }
    function togglePublishTime() {
      var status = document.getElementById('publishStatus').value;
      var scheduleGroup = document.getElementById('scheduleTimeGroup');
      if (status === '2') {
        scheduleGroup.classList.add('show');
      } else {
        scheduleGroup.classList.remove('show');
      }
    }
  </script>
</body>

</html>
